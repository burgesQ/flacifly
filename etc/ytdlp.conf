# Reference yt-dlp options (for --ytdlp-conf / documentation).
#
# NOTE: flacifly builds its download options in code (see
# fetcher/src/fetcher/ytdlp_adapter.py:build_ydl_opts) to guarantee it keeps the
# original best-audio file and transcodes FLAC separately. This file documents the
# equivalent yt-dlp flags and can hold extra options you want to layer on.
#
# Download the best available audio stream (kept as-is; FLAC is made separately).
--format bestaudio/best
# Skip already-downloaded items (per-directory archive is set automatically).
--download-archive .downloaded
# Robustness for long playlists.
--ignore-errors
--geo-bypass
--yes-playlist
# Embed cover art + source metadata into the downloaded file.
--embed-thumbnail
--embed-metadata
# Output naming.
-o "%(title)s.%(ext)s"
# Quiet for scripting.
--no-progress
# Auth for private/age-gated content (keep this file out of git):
# --cookies ~/.cookies.txt
