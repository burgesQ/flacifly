name: CI - Lint / Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.23"

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-packages --dev

      - name: Run ruff
        run: uv run ruff check . || true

      - name: Run black (check only)
        run: uv run black --check --diff . || true

      - name: Run isort (check only)
        run: uv run isort --profile black --check-only . || true

      # Strict: mypy can fail the job.
      - name: Run mypy
        run: uv run mypy -p core -p fetcher -p tagger

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.23"

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-packages --dev

      - name: Run tests with coverage
        run: uv run pytest --cov=core --cov=fetcher --cov=tagger --cov-report=html . -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov
